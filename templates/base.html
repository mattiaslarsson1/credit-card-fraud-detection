<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Bank Fraud Portal{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .navbar {
            background: #111827;
            color: white;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-title {
            font-weight: bold;
            font-size: 18px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 18px;
            font-size: 14px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            margin-bottom: 24px;
        }

        .dashboard-grid {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

        .dashboard-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 260px;
            text-decoration: none;
            color: #1f2937;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            transition: 0.2s;
        }

        .dashboard-card:hover {
            transform: translateY(-4px);
        }

        .dashboard-card.danger {
            border-left: 6px solid #dc2626;
        }

        .button {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .button-danger {
            background: #dc2626;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #111827;
            color: white;
        }

        tr:hover {
            background: #f9fafb;
        }

        .risk-badge {
            background: #fee2e2;
            color: #991b1b;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>

<body>
    {% if session.get("user_email") %}
    <div class="navbar">
        <div class="navbar-title">Bank Fraud Portal</div>
        <div>
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('view_customers') }}">Customers</a>
            <a href="{{ url_for('view_transactions') }}">Transactions</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
